name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main, master]
    types:
      - completed
  workflow_dispatch:

env:
  IMAGE_NAME: web-ssh-manager
  REGISTRY: ghcr.io

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build Docker image
      - name: Build Docker image
        run: docker build -t $REGISTRY/${{ github.repository }}/$IMAGE_NAME:latest .

      # Push to GitHub Container Registry (free)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          docker tag $REGISTRY/${{ github.repository }}/$IMAGE_NAME:latest \
            $REGISTRY/${{ github.repository }}/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/${{ github.repository }}/$IMAGE_NAME:latest
          docker push $REGISTRY/${{ github.repository }}/$IMAGE_NAME:${{ github.sha }}

      # Deploy to VPS via SSH
      - name: Deploy to server
        if: secrets.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull $REGISTRY/${{ github.repository }}/$IMAGE_NAME:latest
            docker stop web-ssh-manager || true
            docker rm web-ssh-manager || true
            docker run -d \
              --name web-ssh-manager \
              --restart always \
              -p 3000:3000 \
              -e MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
              $REGISTRY/${{ github.repository }}/$IMAGE_NAME:latest
            docker system prune -af
